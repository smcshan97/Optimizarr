<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Optimizarr</title>
    <link rel="stylesheet" href="/static/css/theme.css">
    <link rel="stylesheet" href="/static/css/utilities.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { background: var(--bg-base); color: var(--text-primary); font-family: var(--font-sans); }
        .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: var(--bg-card-solid); border: 1px solid var(--border-subtle); padding: 2rem; border-radius: var(--radius-lg); width: 24rem; box-shadow: var(--shadow-md); }
        .login-card h1 { color: var(--accent); }
        .login-card input { background: var(--bg-input); border: 1px solid var(--border-default); color: var(--text-primary); }
        .login-card input:focus { outline: none; border-color: var(--border-focus); }
    </style>
</head>
<body>
    <div class="login-wrap">
        <div class="login-card">
            <h1 class="text-2xl font-bold mb-6 text-center">Optimizarr</h1>
            <p class="text-gray-400 text-center mb-6">Automated Media Optimization</p>
            
            <form id="loginForm" class="space-y-6">
                <div>
                    <label for="username" class="block text-sm font-medium mb-2">Username</label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        required
                        class="w-full px-4 py-2 rounded"
                    >
                </div>
                
                <div>
                    <label for="password" class="block text-sm font-medium mb-2">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        required
                        class="w-full px-4 py-2 rounded"
                    >
                </div>
                
                <div id="errorMessage" class="hidden p-3 rounded border" style="background:rgba(231,76,60,0.1);border-color:rgba(231,76,60,0.3);color:#e74c3c"></div>
                
                <button 
                    type="submit" 
                    class="btn btn-primary w-full py-2"
                >
                    Login
                </button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            
            errorDiv.classList.add('hidden');
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // Store token in localStorage
                    localStorage.setItem('token', data.access_token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    // Redirect to main page
                    window.location.href = '/';
                } else {
                    errorDiv.textContent = data.detail || 'Login failed';
                    errorDiv.classList.remove('hidden');
                }
            } catch (error) {
                errorDiv.textContent = 'Network error. Please try again.';
                errorDiv.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
